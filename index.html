    <button id="signButton">Play</button>
    <pre id="log"></pre>
    <script>
        console.log("Hello World");

        const compChoices = ["rock", "paper", "scissors"];

        function getComputerChoice() {
            let randomizeChoice = Math.floor(Math.random() * compChoices.length) + 1;

            if (randomizeChoice === 1) {
                return "rock";
                let computerChoice = "rock";
            } if (randomizeChoice === 2) {
                return "paper";
                let computerChoice = "paper";
            } if (randomizeChoice === 3) {
                return "scissors";
                let computerChoice = "scissors";
            }
        }
        
        console.log(getComputerChoice());

        const humanChoices = ["rock", "paper", "scissors"];
        let humanChoice = null;

        function getHumanChoice() {
            const signButton = document.querySelector("#signButton");
            const log = document.querySelector("#log");

            signButton.addEventListener("click", () => {
                let sign = prompt("rock, paper, or scissors?");

                let humanChoice = sign;
                log.innerText = `You chose ${sign}.`
                console.log(humanChoice);
            });
        }
        
        let humanScore = 0;
        let computerScore = 0;

        function playRound(humanChoice, computerChoice) {
            if ((humanChoice === "rock" && computerChoice === "rock") || 
                (humanChoice === "paper" && computerChoice === "paper") || 
                (humanChoice === "scissors" && computerChoice === "scissors")) {
                    log.innerText = "It's a tie!";
            } else if ((humanChoice === "rock" && computerChoice === "paper") || 
                       (humanChoice === "paper" && computerChoice === "scissors") || 
                       (humanChoice === "scissors" && computerChoice === "rock")) {
                            computerScore = computerScore + 1;
                            log.innerText = `You lost! ${computerChoice} beats ${humanChoice}.`;
            } else if ((humanChoice === "rock" && computerChoice === "scissors") || 
                       (humanChoice === "paper" && computerChoice === "rock") || 
                       (humanChoice === "scissors" && computerChoice === "paper")) {
                            humanScore = humanScore + 1;
                            log.innerText = `You won! ${humanChoice} beats ${computerChoice}.`;
            } else {
                log.innerText = "";
            }
        }

        const humanSelection =  getHumanChoice();
        const computerSelection = getComputerChoice();

        playRound(humanSelection, computerSelection);

        function playGame() {

            playRound(humanSelection, computerSelection);
        }

    </script>
