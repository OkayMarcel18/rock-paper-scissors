<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <h2>Rock Paper Scissors</h2>
    <p>Press F12 and click "Play" to begin.</p>
    <button id="signButton">Play</button>
    <pre id="log"></pre>
    <script>
        console.log("Hello World");

        function getComputerChoice() {
            let compChoices = ["rock", "paper", "scissors"];
            let randomizeChoice = Math.floor(Math.random() * compChoices.length) + 1;

            if (randomizeChoice === 1) {
                return "rock";
            } if (randomizeChoice === 2) {
                return "paper";
            } if (randomizeChoice === 3) {
                return "scissors";
            }
        }
        
        console.log(getComputerChoice());

        let humanChoices = ["rock", "paper", "scissors"];

        function getHumanChoice() {
            const signButton = document.querySelector("#signButton");
            const log = document.querySelector("#log");

            signButton.addEventListener("click", () => {
                let sign = prompt("rock, paper, or scissors?");

                if (sign === null) {
                    log.innerText = "Invalid choice. Try rock, paper, or scissors.";
                } else if (!sign || sign.trim() === "") {
                    log.innerText = "Enter your choice.";
                } else {
                    sign = sign.toLowerCase();
                }
            });
        }

        let humanScore = 0;
        let computerScore = 0;

        function playRound(humanChoice, computerChoice) {
            if ((humanChoices === "rock" && compChoices === "rock") || 
                (humanChoices === "paper" && compChoices === "paper") || 
                (humanChoices === "scissors" && compChoices === "scissors")) {
                console.log("It's a tie!");
            } else if ((humanChoices === "rock" && compChoices === "paper") || 
                       (humanChoices === "paper" && compChoices === "scissors") || 
                       (humanChoices === "scissors" && compChoices === "rock")) {
                        computerScore = computerScore + 1;
                        console.log("You lost!");
            } else if ((humanChoices === "rock" && compChoices === "scissors") || 
                       (humanChoices === "paper" && compChoices === "rock") || 
                       (humanChoices === "scissors" && compChoices === "paper")) {
                        humanScore = humanScore + 1;
                        console.log("You won!");
            } else {
                log.innerText = "";
            }
        }

        console.log(playRound());

        const humanSelection =  getHumanChoice();
        const computerSelection = getComputerChoice();

        playRound(humanSelection, computerSelection);

    </script>

</body>
</html>
