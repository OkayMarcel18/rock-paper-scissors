<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <h2>Rock Paper Scissors</h2>
    <p>Press F12 and click "Play" to begin.</p>
    <button id="signButton">Play</button>
    <pre id="log"></pre>
    <script>
        console.log("Hellow World");
        
        let compChoices;

        function getComputerChoice() {
            let compChoices = ["rock", "paper", "scissors"];
            let randomizeChoice = Math.floor(Math.random() * compChoices.length) + 1;

            if (randomizeChoice === 1) {
                return "rock";
            } if (randomizeChoice === 2) {
                return "paper";
            } if (randomizeChoice === 3) {
                return "scissors";
            }
        }
        
        console.log(getComputerChoice());

        function getHumanChoice() {
            let humanChoices = ["rock", "paper", "scissors"];
            const signButton = document.querySelector("#signButton");
            const log = document.querySelector("#log");

            signButton.addEventListener("click", () => {
                let sign = prompt("Play");

                if (sign === null) {
                    log.innerText = "Okay, maybe later.";
                } else if (!sign || sign.trim() === "") {
                    log.innerText = "Enter your choice.";
                } else {
                    sign = sign.toLowerCase();
                }
                    if (sign.toLowerCase() === "rock" && compChoices === 1) {
                        log.innerText = "It's a tie!";
                    } else if (sign.toLowerCase() === "rock" && compChoices === 2) {
                        log.innerText = "You lost!";
                    } else if (sign.toLowerCase() === "rock" && compChoices === 3) {
                        log.innerText = "You won!";
                    } else if (sign.toLowerCase() === "paper" && compChoices === 1) {
                        log.innerText = "You won!";
                    } else if (sign.toLowerCase() === "paper" && compChoices === 2) {
                        log.innerText = "It's a tie!";
                    } else if (sign.toLowerCase() === "paper" && compChoices === 3) {
                        log.innerText = "You lost!";
                    } else if (sign.toLowerCase() === "scissors" && compChoices === 1) {
                        log.innerText = "You lost!";
                    } else if (sign.toLowerCase() === "scissors" && compChoices === 2) {
                        log.innerText = "You won!";
                    } else if (sign.toLowerCase() === "scissors" && compChoices === 3) {
                        log.innerText = "It's a tie!";
                    } else {
                        log.innerText = "Invalid choice. Try rock, paper, or scissors.";
                    }
                }
            )};


    </script>

</body>
</html>
