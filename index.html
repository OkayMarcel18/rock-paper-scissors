<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <h2>Rock Paper Scissors</h2>
    <p>Press F12 and click "Play" to begin.</p>
    <p>Hint: Your first choice counts!</p>
    <button id="signButton">Play</button>
    <pre id="log"></pre>
    <script>
        console.log("Hello World");

        const signButton = document.querySelector("#signButton");
        const log = document.querySelector("#log");
        signButton.addEventListener("click", playGame);

        const compChoices = ["rock", "paper", "scissors"];

        function getComputerChoice() {
            let randomizeChoice = Math.floor(Math.random() * compChoices.length) + 1;

            if (randomizeChoice === 1) {
                let computerChoice = "rock";
                return computerChoice;
            } if (randomizeChoice === 2) {
                let computerChoice = "paper";
                return computerChoice;
            } if (randomizeChoice === 3) {
                let computerChoice = "scissors";
                return computerChoice;
            }
        }        

        const humanChoices = ["rock", "paper", "scissors"];

        function getHumanChoice() { 
            let humanChoice = prompt("rock, paper, or scissors?").toLowerCase();

            log.innerText = `You chose ${humanChoice}.`
            console.log(humanChoice);
            return humanChoice;
        }

        let humanScore = 0;
        let computerScore = 0;

        function playRound(humanChoice, computerChoice) {
            if (humanChoice === computerChoice) {
                    let roundWinner = "It's a tie!";
                    console.log(computerChoice);
                    console.log(roundWinner);
                    console.log(humanScore, computerScore);
                    return roundWinner;
            } else if ((humanChoice === "rock" && computerChoice === "paper") || 
                       (humanChoice === "paper" && computerChoice === "scissors") || 
                       (humanChoice === "scissors" && computerChoice === "rock")) {
                            computerScore++;
                            let roundWinner = `You lost! ${computerChoice} beats ${humanChoice}.`;
                            console.log(computerChoice);
                            console.log(roundWinner);
                            console.log(humanScore, computerScore);
                            return roundWinner;
            } else if ((humanChoice === "rock" && computerChoice === "scissors") || 
                       (humanChoice === "paper" && computerChoice === "rock") || 
                       (humanChoice === "scissors" && computerChoice === "paper")) {
                            humanScore++;
                            let roundWinner = `You won! ${humanChoice} beats ${computerChoice}.`;
                            console.log(computerChoice);
                            console.log(roundWinner);
                            console.log(humanScore, computerScore);
                            return roundWinner;
            } else {
                log.innerText = "";
            }
        }

        const humanSelection =  getHumanChoice();
        const computerSelection = getComputerChoice();

        playRound(humanSelection, computerSelection);

        function playGame() {

            const computerChoice = getComputerChoice();
            const humanChoice = getHumanChoice();

            playRound(humanChoice, computerChoice);

            if (humanScore === 5) {
                alert("You win! Reload page to play again.");
            } else if (computerScore === 5 ) {
                alert("Game over! Reload the page to play again.");
            } else {
                log.innerText = "";
            }
        }

    </script>

</body>
</html>
